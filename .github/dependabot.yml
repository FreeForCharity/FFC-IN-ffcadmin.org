version: 2
updates:
  # Enable version updates for npm packages
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'automated'
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
      # eslint-plugin-react-hooks >= 7.1 adds stricter rules (immutability,
      # setState-in-effect, use-before-declare) that currently error in
      # CookieConsent.tsx. Hold at 7.0.x until that refactor lands (see #389).
      - dependency-name: 'eslint-plugin-react-hooks'
        update-types:
          - 'version-update:semver-major'
          - 'version-update:semver-minor'
    groups:
      # Group development dependencies together (minor and patch updates)
      development-dependencies:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
      # Group development dependencies together (major updates)
      development-dependencies-major:
        dependency-type: 'development'
        update-types:
          - 'major'
      # Group production dependencies together (minor and patch updates)
      production-dependencies:
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      # Group production dependencies together (major updates)
      production-dependencies-major:
        dependency-type: 'production'
        update-types:
          - 'major'

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github_actions'
    groups:
      # Group all GitHub Actions updates together
      github_actions:
        patterns:
          - '*'
