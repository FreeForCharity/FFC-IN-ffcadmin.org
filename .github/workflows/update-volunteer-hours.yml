name: Update Volunteer Hours Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *' # Daily at 5am UTC
  issues:
    types: [labeled, unlabeled, edited, closed, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  update-hours:
    runs-on: ubuntu-latest
    # On issue events, only run for volunteer-hours issues (avoid churn on
    # unrelated issue activity). Scheduled/manual runs always proceed.
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'volunteer-hours')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Generate volunteer hours JSON
        run: node scripts/generate-volunteer-hours.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat(data): refresh volunteer hours data'
          branch: 'data/volunteer-hours'
          delete-branch: true
          title: 'feat(data): refresh volunteer hours data'
          body: |
            Automated refresh of `public/data/volunteer-hours.json` from
            approved `volunteer-hours` issues (program-lead certified).

            Generated by `scripts/generate-volunteer-hours.mjs` (#361/#362).

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
