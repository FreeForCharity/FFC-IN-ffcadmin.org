name: Verify Assignment

# When an intake issue is assigned, confirm the assignee is a member of the
# `sponsoring-admins` GitHub team (the verification artifact, program plan §8).
# Verified -> applies `verified-assignment`. Unverified -> removes the
# assignment and explains how to become a sponsoring admin.
#
# GUARDED: needs a PAT with read:org. It is preferentially pulled from Azure Key
# Vault via OIDC (set the AZURE_* variables); a secrets.GH_PAT still works as a
# fallback. Until one exists the workflow skips cleanly, so CI stays green before
# setup is complete. See docs/azure-keyvault-setup.md.

on:
  issues:
    types: [assigned]

permissions:
  id-token: write # Azure OIDC (when sourcing the PAT from Key Vault)
  issues: write

env:
  ORG: FreeForCharity
  TEAM: sponsoring-admins

jobs:
  verify:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'kind:intake')
    steps:
      - name: Guard on credential availability
        id: guard
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_KEY_VAULT_NAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "use_kv=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$GH_PAT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "use_kv=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No GH PAT available (Key Vault or secret); skipping assignment verification until setup is complete."
          fi

      - name: Checkout repository
        if: steps.guard.outputs.use_kv == 'true'
        uses: actions/checkout@v6

      - name: Load GH PAT from Key Vault
        if: steps.guard.outputs.use_kv == 'true'
        uses: ./.github/actions/azure-kv-secrets
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          vault-name: ${{ vars.AZURE_KEY_VAULT_NAME }}
          # Export directly as GH_TOKEN so the check step reads $GH_TOKEN at runtime.
          secrets: |
            GH_TOKEN=${{ vars.KV_SECRET_GH_PAT || 'read-all-cbm-github-pat' }}

      - name: Use GH PAT secret (fallback)
        if: steps.guard.outputs.enabled == 'true' && steps.guard.outputs.use_kv != 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: echo "GH_TOKEN=${GH_PAT}" >> "$GITHUB_ENV"

      - name: Check team membership and label
        if: steps.guard.outputs.enabled == 'true'
        # GH_TOKEN comes from the job environment ($GITHUB_ENV): the Key Vault
        # step or the secret-fallback step set it. No expression here, so the
        # runtime value is always used.
        env:
          ASSIGNEE: ${{ github.event.assignee.login }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # Check team membership by explicit HTTP status: 200/204 = member,
          # 404 = not a member. Any other code (rate limit, outage, perms) must
          # NOT revert a valid assignment — we warn and leave the issue untouched.
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${ORG}/teams/${TEAM}/memberships/${ASSIGNEE}" || echo "000")
          if [ "$code" = "200" ] || [ "$code" = "204" ]; then
            echo "${ASSIGNEE} is a verified sponsoring admin."
            # Remove the prior lifecycle status so only one status:* label
            # remains (the roadmap generator classifies by the status:* label).
            gh issue edit "$ISSUE" --repo "$REPO" \
              --add-label "verified-assignment,status:sponsored" \
              --remove-label "verified-admin-action-needed,status:intake,status:needs-info,status:needs-admin,status:on-hold,status:active-build,status:live,status:graduated" || true
          elif [ "$code" = "404" ]; then
            echo "${ASSIGNEE} is NOT a sponsoring admin; reverting assignment."
            gh issue edit "$ISSUE" --repo "$REPO" \
              --remove-assignee "$ASSIGNEE" \
              --add-label "verified-admin-action-needed" || true
            gh issue comment "$ISSUE" --repo "$REPO" --body \
              "Thanks for your interest! Assignment is reserved for verified **sponsoring admins**. Please complete verification first — see https://ffcadmin.org/roadmap/sponsor — and we'll get you assigned."
          else
            echo "::warning::Team-membership check returned HTTP ${code} for ${ASSIGNEE}; leaving the assignment unchanged."
          fi
