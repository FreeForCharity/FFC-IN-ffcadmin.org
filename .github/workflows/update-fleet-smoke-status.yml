name: Update Fleet Smoke Status Data

on:
  workflow_dispatch:
  schedule:
    # Daily, after the fleet-wide 05:17 UTC smoke pass has finished
    # (FFC-Cloudflare-Automation#738 — smoke engine v2).
    - cron: '45 6 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-fleet-smoke-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate fleet smoke status JSON
        run: node scripts/generate-fleet-smoke-status.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upsert stale-monitor hub issue
        run: node scripts/report-stale-monitors.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat(data): refresh fleet smoke status data'
          branch: 'data/fleet-smoke-status'
          delete-branch: true
          title: 'feat(data): refresh fleet smoke status data'
          body: |
            Automated refresh of `public/data/fleet-smoke-status.json` from the
            GitHub Actions API (latest Post-Deploy Smoke Test run, cut-over
            state, and open smoke-failure issue per fleet repo).

            Generated by `scripts/generate-fleet-smoke-status.mjs`
            (FreeForCharity/FFC-Cloudflare-Automation#738).

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
