name: Build Roadmap Data

# Regenerates public/data/roadmap.json from this repo's `kind:intake` issues and
# opens a PR (the repo forbids direct commits to main — same pattern as
# update-sites-data.yml / update-volunteer-hours.yml). Uses only the built-in
# GITHUB_TOKEN; no extra secrets.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC
  issues:
    types: [opened, edited, labeled, unlabeled, assigned, unassigned, closed, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  build-roadmap:
    runs-on: ubuntu-latest
    # On issue events, only react to intake issues; scheduled/manual runs always proceed.
    if: >-
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'kind:intake')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate roadmap JSON
        run: pnpm run data:roadmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat(data): refresh public roadmap data'
          branch: 'data/roadmap'
          delete-branch: true
          title: 'feat(data): refresh public roadmap data'
          body: |
            Automated refresh of `public/data/roadmap.json` from `kind:intake`
            issues. Readiness scores are computed by the shared engine in
            `src/lib/readiness/` (single source of truth).

            Generated by `scripts/generate-roadmap-data.ts`.

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
