name: Sync From Zeffy

# Polls Zeffy for new contacts every few hours and opens stub intake issues so a
# charity appears on the public roadmap as soon as it submits to Zeffy
# (program plan §5, §12). Updates the sync state file via a PR.
#
# GUARDED: requires secrets.ZEFFY_API_KEY. Without it the script logs and exits
# 0, so scheduled runs stay green until the key is provisioned.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # Every 5 hours (§15 #44: 4-6h window)

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Sync from Zeffy
        run: node scripts/sync-from-zeffy.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ZEFFY_API_KEY: ${{ secrets.ZEFFY_API_KEY }}

      - name: Create Pull Request (state file)
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(data): update Zeffy sync state'
          branch: 'data/zeffy-sync-state'
          delete-branch: true
          title: 'chore(data): update Zeffy sync state'
          body: |
            Automated update of `public/data/zeffy-sync-state.json` after polling
            Zeffy for new contacts. Generated by `scripts/sync-from-zeffy.mjs`.
