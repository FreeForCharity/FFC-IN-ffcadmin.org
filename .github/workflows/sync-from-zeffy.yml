name: Sync From Zeffy

# Polls Zeffy ONCE A DAY for new charity-application submissions and opens stub
# intake issues so a charity appears on the public roadmap as soon as it applies
# (program plan §5, §12). Product-gated: only submissions to the configured
# application campaign(s) become stubs — never every Zeffy contact. Updates the
# sync state file via a PR.
#
# GUARDED: requires secrets.ZEFFY_API_KEY and ZEFFY_INTAKE_CAMPAIGN_IDS. Without
# them the script logs and exits 0, so scheduled runs stay green.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Once a day at 08:00 UTC (avoid over-polling)

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Sync from Zeffy
        run: node scripts/sync-from-zeffy.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ZEFFY_API_KEY: ${{ secrets.ZEFFY_API_KEY }}
          ZEFFY_INTAKE_CAMPAIGN_IDS: ${{ secrets.ZEFFY_INTAKE_CAMPAIGN_IDS }}
          ZEFFY_FINGERPRINT_SALT: ${{ secrets.ZEFFY_FINGERPRINT_SALT }}

      - name: Create Pull Request (state file)
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(data): update Zeffy sync state'
          branch: 'data/zeffy-sync-state'
          delete-branch: true
          title: 'chore(data): update Zeffy sync state'
          body: |
            Automated update of `automation/zeffy-sync-state.json` (dedup
            fingerprints, no PII) after new charity applications came in via
            Zeffy. Generated by `scripts/sync-from-zeffy.mjs`. Opened only when
            state changed.
