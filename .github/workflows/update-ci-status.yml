name: Update CI Status Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # Daily at 6am UTC
  workflow_run:
    workflows: ['Build, Test, and Verify']
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-ci-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate CI status JSON
        run: node scripts/generate-ci-status.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat(data): refresh CI status dashboard data'
          branch: 'data/ci-status'
          delete-branch: true
          title: 'feat(data): refresh CI status dashboard data'
          body: |
            Automated refresh of `public/data/ci-status.json` from the GitHub
            Actions API (latest run per tracked workflow on `main`).

            Generated by `scripts/generate-ci-status.mjs` (#337).

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
