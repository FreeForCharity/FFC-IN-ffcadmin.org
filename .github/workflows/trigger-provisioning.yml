name: Trigger Provisioning

# After an intake issue passes verification (the `verified-assignment` label is
# applied), send a repository_dispatch to FFC-Cloudflare-Automation so its
# existing 15-website-provision.yml workflow can provision the site
# (program plan §12). See docs/migration-plan.md for the Cloudflare-side snippet.
#
# GUARDED: needs a cross-repo PAT with repo + workflow scope. It is preferentially
# pulled from Azure Key Vault via OIDC (set the AZURE_* variables); a
# secrets.GH_PAT still works as a fallback. Skips cleanly until one exists. See
# docs/azure-keyvault-setup.md.

on:
  issues:
    types: [labeled]

permissions:
  id-token: write # Azure OIDC (when sourcing the PAT from Key Vault)
  issues: write

env:
  TARGET_REPO: FreeForCharity/FFC-Cloudflare-Automation
  EVENT_TYPE: ffcadmin-website-provision

jobs:
  dispatch:
    runs-on: ubuntu-latest
    # Only intake issues with an actual assignee; avoids null-assignee edge
    # cases and accidental dispatches from a manual label add on other issues.
    if: >-
      github.event.label.name == 'verified-assignment' &&
      contains(github.event.issue.labels.*.name, 'kind:intake') &&
      github.event.issue.assignee != null
    steps:
      - name: Guard on credential availability
        id: guard
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_KEY_VAULT_NAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "use_kv=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$GH_PAT" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "use_kv=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No GH PAT available (Key Vault or secret); skipping provisioning dispatch until setup is complete."
          fi

      - name: Checkout repository
        if: steps.guard.outputs.use_kv == 'true'
        uses: actions/checkout@v6

      - name: Load GH PAT from Key Vault
        if: steps.guard.outputs.use_kv == 'true'
        uses: ./.github/actions/azure-kv-secrets
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          vault-name: ${{ vars.AZURE_KEY_VAULT_NAME }}
          secrets: |
            GH_PAT=${{ vars.KV_SECRET_GH_PAT || 'ffc-gh-pat' }}

      - name: Dispatch to Cloudflare automation
        if: steps.guard.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ env.GH_PAT || secrets.GH_PAT }}
          ISSUE: ${{ github.event.issue.number }}
          TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ASSIGNEE: ${{ github.event.issue.assignee.login }}
          REPO: ${{ github.repository }}
          BODY: ${{ github.event.issue.body }}
        run: |
          set -uo pipefail
          # Extract the optional "Desired domain name" the applicant supplied, so
          # the Cloudflare provision workflow can read client_payload.domain.
          # Issue-form bodies are "### Label\n\nvalue" blocks; an awk state
          # machine starts capturing AFTER the heading and stops at the next one,
          # printing the first non-empty value line.
          DOMAIN=$(printf '%s\n' "$BODY" | awk '
            /^### Desired domain name[[:space:]]*$/ { capture = 1; next }
            /^### / { capture = 0 }
            capture && NF { print; exit }
          ' | tr -d '[:space:]')
          # Drop the "_No response_" placeholder GitHub inserts for blank fields.
          if printf '%s' "$DOMAIN" | grep -qiE '^_no.?response_$'; then DOMAIN=""; fi
          gh api "repos/${TARGET_REPO}/dispatches" \
            -f "event_type=${EVENT_TYPE}" \
            -F "client_payload[ffcadmin_issue]=${ISSUE}" \
            -F "client_payload[charity_title]=${TITLE}" \
            -F "client_payload[issue_url]=${ISSUE_URL}" \
            -F "client_payload[sponsor]=${ASSIGNEE}" \
            -F "client_payload[domain]=${DOMAIN}"
          gh issue comment "$ISSUE" --repo "$REPO" --body \
            "✅ Verified assignment confirmed. Provisioning has been triggered in \`${TARGET_REPO}\`. This issue will update as the site is provisioned."
