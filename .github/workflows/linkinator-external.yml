name: Weekly Linkinator — External Links (site-wide)

# Scans the whole built site for broken external/vendor URLs.
#
# The main CI linkinator (in ci.yml) skips ALL external URLs by policy
# (they are flaky in PR CI), so external link rot would otherwise go
# undetected. This separate weekly job checks external links across the
# entire site and surfaces 4xx/5xx as a workflow failure for a human to
# triage. Known bot-blocking/rate-limited hosts are skipped in the config.
#
# Tracking issues: #251, #391.

on:
  schedule:
    # Mondays 13:00 UTC.
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  scan:
    name: Scan external URLs across the whole site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm run build

      - name: Run linkinator with a config that DOES scan external URLs
        id: linkinator
        run: |
          set +e
          pnpm exec linkinator ./out \
            --config .linkinatorrc-external.json \
            --format json \
            > link-report.json
          status=$?
          # Print a short summary regardless of outcome.
          echo "=== Linkinator summary ==="
          jq -r '
            "Total links scanned: \(.links | length)\n" +
            "Passing: \([.links[] | select(.state == \"OK\")] | length)\n" +
            "Broken (4xx/5xx): \([.links[] | select(.status >= 400 and .status < 600)] | length)"
          ' link-report.json || true

          # Emit a structured list of broken URLs if any exist.
          if jq -e '[.links[] | select(.status >= 400 and .status < 600)] | length > 0' link-report.json >/dev/null 2>&1; then
            echo ""
            echo "=== Broken URLs ==="
            jq -r '.links[] | select(.status >= 400 and .status < 600) | "  [\(.status)] \(.url) (from \(.parent))"' link-report.json
            echo "broken=true" >> "$GITHUB_OUTPUT"
          else
            echo "broken=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload link report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linkinator-external-report
          path: link-report.json
          retention-days: 30

      - name: Fail the workflow if broken links were found
        if: steps.linkinator.outputs.broken == 'true'
        run: |
          echo "::error::Broken external URLs detected. See workflow logs + uploaded artifact."
          exit 1
