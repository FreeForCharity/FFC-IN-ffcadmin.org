name: Update Campaigns Registry Data

on:
  workflow_dispatch:
  schedule:
    # Daily at 07:15 UTC, after the 06:45 UTC fleet-smoke-status refresh has
    # committed the live/served fleet this collector reads
    # (FFC-Cloudflare-Automation#746, child of #745).
    - cron: '15 7 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-campaigns-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate campaigns registry JSON
        run: node scripts/generate-campaigns-registry.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat(data): refresh campaigns registry data'
          branch: 'data/campaigns-registry'
          delete-branch: true
          title: 'feat(data): refresh campaigns registry data'
          body: |
            Automated refresh of `public/data/campaigns-registry.json` — every
            Zeffy donation/ticketing surface detected across the live fleet
            (from `public/data/fleet-smoke-status.json`), classified `ffc-owned`
            vs `charity-specific`, with per-site attribution and first/last-seen.

            Generated by `scripts/generate-campaigns-registry.mjs`
            (FreeForCharity/FFC-Cloudflare-Automation#746).

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
