name: WHMCS Intake (local)

# LOCAL charity intake: query WHMCS directly for applicants and open a
# kind:intake issue per new one — no dependency on the Cloudflare repo
# publishing a feed. WHMCS credentials are pulled at runtime from Azure Key
# Vault via GitHub OIDC (no long-lived secret stored in GitHub).
#
# GUARDED: skips cleanly unless the Azure identity variables are configured
# (vars.AZURE_CLIENT_ID etc.), so CI stays green until setup is complete. See
# docs/azure-keyvault-setup.md.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print the applicant records to the log without creating issues'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 8 * * *' # Once a day at 08:00 UTC (avoid over-polling WHMCS)

permissions:
  id-token: write # required for Azure OIDC federation
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: whmcs-intake
  cancel-in-progress: false

jobs:
  intake:
    runs-on: ubuntu-latest
    steps:
      - name: Guard on Azure configuration
        id: guard
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_KEY_VAULT_NAME: ${{ vars.AZURE_KEY_VAULT_NAME }}
        run: |
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_KEY_VAULT_NAME" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Azure variables not set; skipping WHMCS intake until setup is complete (see docs/azure-keyvault-setup.md)."
          fi

      - name: Checkout repository
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Load WHMCS credentials from Key Vault
        if: steps.guard.outputs.enabled == 'true'
        uses: ./.github/actions/azure-kv-secrets
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          vault-name: ${{ vars.AZURE_KEY_VAULT_NAME }}
          # Defaults are the FFC vault's real secret names; override via vars.
          # (WHMCS here authenticates with identifier + secret — there is no
          # separate access-key secret.)
          secrets: |
            WHMCS_API_IDENTIFIER=${{ vars.KV_SECRET_WHMCS_IDENTIFIER || 'read-all-ffc-whmcs-api-identifier' }}
            WHMCS_API_SECRET=${{ vars.KV_SECRET_WHMCS_SECRET || 'read-all-ffc-whmcs-api-secret' }}

      - name: Run WHMCS intake
        if: steps.guard.outputs.enabled == 'true'
        run: node scripts/whmcs-applications.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Route through the FFC APIM gateway (static egress IP 20.231.116.111,
          # the only IP WHMCS allow-lists). GitHub runner IPs are dynamic and
          # would be rejected with "Invalid IP". See docs/whmcs-apim-routing.md in
          # FFC-Cloudflare-Automation. Override via vars.WHMCS_API_URL if needed.
          WHMCS_API_URL: ${{ vars.WHMCS_API_URL || 'https://apim-ffc-gateway-prod.azure-api.net/whmcs/api.php' }}
          # WHMCS_API_IDENTIFIER / _SECRET come from Key Vault above.
          WHMCS_DRY_RUN: ${{ inputs.dry_run && '1' || '' }}

      - name: Create Pull Request (state file)
        if: steps.guard.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(data): update applications sync state (WHMCS)'
          branch: 'data/applications-sync-state'
          delete-branch: true
          title: 'chore(data): update applications sync state'
          body: |
            Automated update of `automation/applications-sync-state.json` (dedup
            ids, no PII) after the local WHMCS intake found new applicants.
            Generated by `scripts/whmcs-applications.mjs`. Opened only when the
            state changed.
