name: Sync Sites List Data

# The sites list is generated in FreeForCharity/FFC-Cloudflare-Automation, which
# owns the WHMCS / Cloudflare / WPMUDEV export environments and the GitHub PAT
# needed to run them. This workflow simply pulls the published, public files and
# opens a PR. It needs NO secrets.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Mondays at 09:00 UTC (after the upstream generator)

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch published sites list
        env:
          SRC: https://raw.githubusercontent.com/FreeForCharity/FFC-Cloudflare-Automation/main/sites-list
        run: |
          set -euo pipefail
          curl -fsSL "$SRC/sites_list.csv" -o docs/sites_list.csv
          curl -fsSL "$SRC/sites_list.json" -o docs/sites_list.json
          echo "Fetched $(wc -l < docs/sites_list.csv) lines of CSV."

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(data): sync sites list from FFC-Cloudflare-Automation'
          branch: 'data/sites-list-sync'
          delete-branch: true
          title: 'chore(data): sync sites list from FFC-Cloudflare-Automation'
          body: |
            Automated sync of the published sites list (`sites_list.csv` and
            `sites_list.json`) from `FreeForCharity/FFC-Cloudflare-Automation`,
            where the data is generated from the WHMCS / Cloudflare / WPMUDEV
            exports. No secrets are used on this side.
