name: Sync Sites List Data

# The sites list is generated in FreeForCharity/FFC-Cloudflare-Automation, which
# owns the WHMCS / Cloudflare / WPMUDEV export environments and the GitHub PAT
# needed to run them. This workflow simply pulls the published, public files and
# opens a PR. It needs NO secrets.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1' # Weekly on Mondays at 09:00 UTC (after the upstream generator)

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch published sites list
        id: fetch
        env:
          SRC: https://raw.githubusercontent.com/FreeForCharity/FFC-Cloudflare-Automation/main/sites-list
        run: |
          set -uo pipefail
          tmp="$(mktemp -d)"
          ok=true
          curl -fsSL "$SRC/sites_list.csv" -o "$tmp/sites_list.csv" || ok=false
          curl -fsSL "$SRC/sites_list.json" -o "$tmp/sites_list.json" || ok=false
          if [ "$ok" != true ]; then
            # Upstream not published yet (or a transient error): skip without
            # failing the run, so scheduled runs don't go red with nothing to do.
            echo "::warning::Upstream sites list not available; nothing to sync."
            echo "fetched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Keep the outgoing snapshot so the Sites List can highlight rows
          # that changed between refreshes (#425).
          if [ -f docs/sites_list.csv ]; then
            cp docs/sites_list.csv docs/sites_list.prev.csv
          fi
          mv "$tmp/sites_list.csv" docs/sites_list.csv
          mv "$tmp/sites_list.json" docs/sites_list.json
          echo "fetched=true" >> "$GITHUB_OUTPUT"
          echo "Fetched $(wc -l < docs/sites_list.csv) lines of CSV."

      - name: Create Pull Request
        if: steps.fetch.outputs.fetched == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(data): sync sites list from FFC-Cloudflare-Automation'
          branch: 'data/sites-list-sync'
          delete-branch: true
          title: 'chore(data): sync sites list from FFC-Cloudflare-Automation'
          body: |
            Automated sync of the published sites list (`sites_list.csv` and
            `sites_list.json`) from `FreeForCharity/FFC-Cloudflare-Automation`,
            where the data is generated from the WHMCS / Cloudflare / WPMUDEV
            exports. No secrets are used on this side.
