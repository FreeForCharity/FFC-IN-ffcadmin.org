name: Sync Applications

# Once a day, reads the PII-safe applications feed published by the repo that
# owns the WHMCS/Zeffy flows (FFC-Cloudflare-Automation) and opens a kind:intake
# issue per new applicant, so charities appear on the public roadmap. FFCadmin
# holds NO WHMCS/Zeffy credentials — it only reads a public file and uses its
# built-in GITHUB_TOKEN to create issues. See docs/migration-plan.md for the
# feed contract. No-op until the feed is published.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # Once a day at 08:00 UTC (avoid over-polling)

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Sync applications
        run: node scripts/sync-applications.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Optional override of the published feed URL.
          APPLICATIONS_SRC_URL: ${{ vars.APPLICATIONS_SRC_URL }}

      - name: Create Pull Request (state file)
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(data): update applications sync state'
          branch: 'data/applications-sync-state'
          delete-branch: true
          title: 'chore(data): update applications sync state'
          body: |
            Automated update of `automation/applications-sync-state.json` (dedup
            ids, no PII) after new applications appeared in the published feed.
            Generated by `scripts/sync-applications.mjs`. Opened only when the
            state changed.
