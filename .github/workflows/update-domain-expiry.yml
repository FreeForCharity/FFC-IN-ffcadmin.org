name: Update Domain Expiry Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1' # Weekly on Mondays at 7am UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update-domain-expiry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate domain expiry JSON (RDAP)
        run: node scripts/generate-domain-expiry.mjs

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'feat(data): refresh domain expiry dashboard data'
          branch: 'data/domain-expiry'
          delete-branch: true
          title: 'feat(data): refresh domain expiry dashboard data'
          body: |
            Automated refresh of `public/data/domain-expiry.json` via RDAP
            lookups for FFC-managed apex domains in `docs/sites_list.csv`.

            Generated by `scripts/generate-domain-expiry.mjs` (#337).

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --merge "${{ steps.create-pr.outputs.pull-request-number }}"
